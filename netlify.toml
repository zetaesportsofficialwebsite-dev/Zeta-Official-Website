[build]
  command = "mkdir -p dist && rsync -a --exclude 'Clubs Background' --exclude 'reference' --exclude 'temp-compare' --exclude 'dist' --exclude '.git' --exclude 'netlify.toml' --exclude '.gitignore' --exclude 'CLAUDE.md' --exclude 'README.md' ./ dist/"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
